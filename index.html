<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>让我帮你百度一下</title>

  <!-- 引入外部 CSS 文件 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <main class="main">
      <section class="title">
        <div class="title">让我帮你
          <img src="baidu-logo.png" alt="百度" class="baidu-logo" />一下
        </div>
      </section>

      <section class="search-box">
        <form id="searchForm" class="search-form">
          <input
            id="kw"
            class="search-input"
            type="text"
            autocomplete="off"
          />
          <button id="searchBtn" class="search-btn" type="submit">
            百度一下
          </button>
        </form>

        <div id="tips" class="tips">输入一个问题，然后点击百度一下</div>

        <button id="stopBtn" class="stop-btn" type="button">
          快停下！是自己人
        </button>

        <div id="outputPanel" class="output-panel">
          <textarea id="shareUrl" readonly></textarea>
          <div class="tool-row">
            <button id="copyBtn" class="tool-btn" type="button">复制</button>
            <button id="previewBtn" class="tool-btn" type="button">预览</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      没了
    </footer>
  </div>

  <!-- 指示手势 -->
  <div id="guide" class="guide"></div>

  <!-- 引入外部 JS 文件 -->
  <script src="script.js"></script>
</body>
</html>
